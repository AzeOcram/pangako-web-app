<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News — Pangako</title>
  <link rel="stylesheet" href="news.css" />
  <link rel="stylesheet" href="../page-transitions.css" />

  <script>
    if (sessionStorage.getItem('pangakoHomeTransition')) {
      document.documentElement.classList.add('from-home-transition');
    }
  </script>
</head>
<body>

  <a href="../index.html" class="page-logo">
    <img src="../images/main_logo.png" alt="Pangako" class="page-logo-img" />
  </a>

  <nav class="navbar">
    <div class="nav-links-wrapper">
      <ul class="nav-links">
        <li><a href="../index.html" class="nav-link">Home</a></li>
        <li><a href="../politicians-section/politicians.html" class="nav-link">Politicians</a></li>
        <li><a href="news.html" class="nav-link active">News</a></li>
        <li><a href="../feedback-section/feedback.html" class="nav-link">Feedback</a></li>
      </ul>
    </div>
  </nav>

  <main class="news">
    <!-- Grid rendered dynamically from API -->
    <div class="news-grid" id="newsGrid">
      <div style="text-align:center; padding:40px; color:#888;">Loading news...</div>
    </div>

    <div class="news-expand">
      <button class="news-expand-btn" id="expandBtn" onclick="toggleNews()" style="display:none;">Show More</button>
    </div>
  </main>

  <script>
    const API = 'http://localhost:3000/api';
    const VISIBLE_COUNT = 6;

    async function loadNews() {
      try {
        const res = await fetch(`${API}/news`);
        const data = await res.json();
        const articles = data.data || [];
        renderNews(articles);
      } catch (err) {
        document.getElementById('newsGrid').innerHTML = '<div style="text-align:center; padding:40px; color:#888;">Failed to load news. Is the server running?</div>';
      }
    }

    function renderNews(articles) {
      const grid = document.getElementById('newsGrid');
      const btn = document.getElementById('expandBtn');

      if (articles.length === 0) {
        grid.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">No news articles yet.</div>';
        return;
      }

      grid.innerHTML = articles.map(function(article, index) {
        const isHidden = index >= VISIBLE_COUNT;
        return `
          <div class="news-card${isHidden ? ' news-card--hidden' : ''}">
            <div class="news-inner">
              <img class="news-photo" src="${article.image}" alt="${article.title}" />
              <div class="news-body">
                <h3 class="news-headline">${article.title}</h3>
                <p class="news-summary">${article.summary || article.body[0] || ''}</p>
                <a href="news-detail.html?id=${article._id}" class="news-btn">View News</a>
              </div>
            </div>
          </div>
        `;
      }).join('');

      btn.style.display = articles.length > VISIBLE_COUNT ? 'inline-block' : 'none';
    }

    function toggleNews() {
      const hidden = document.querySelectorAll('.news-card--hidden');
      const btn = document.getElementById('expandBtn');
      const isHidden = hidden[0].style.display === 'none' || hidden[0].style.display === '';
      hidden.forEach(card => card.style.display = isHidden ? 'flex' : 'none');
      btn.textContent = isHidden ? 'Show Less' : 'Show More';
    }

    document.addEventListener('click', function (e) {
      const link = e.target.closest('.news-btn');
      if (!link) return;

      const card = link.closest('.news-card');
      const img = card?.querySelector('.news-photo');
      if (img) {
        img.style.viewTransitionName = 'news-image';
      }
    });

    loadNews();
  </script>

  <script src="../page-transitions.js"></script>

</body>
</html>
