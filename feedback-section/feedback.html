<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — Pangako</title>
  <link rel="stylesheet" href="feedback.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">
      <img src="../images/main_logo.png" alt="Pangako" class="nav-logo-img" />
    </a>
    <div class="nav-links-wrapper">
      <ul class="nav-links">
        <li><a href="../index.html" class="nav-link">Home</a></li>
        <li><a href="../politicians-section/politicians.html" class="nav-link">Politicians</a></li>
        <li><a href="../news-section/news.html" class="nav-link">News</a></li>
        <li><a href="feedback.html" class="nav-link active">Feedback</a></li>
      </ul>
    </div>
  </nav>

  <main class="feedback-main">

    <div class="feedback-hero">
      <h1 class="feedback-title">Submit a Report</h1>
      <p class="feedback-sub">Help us keep politicians accountable. Submit new evidence, corrections, or tip-offs about campaign promises.</p>
    </div>

    <div class="feedback-layout">

      <!-- FORM -->
      <div class="feedback-form-wrap">
        <div class="form-card">
          <div class="form-inner">

          <div class="form-group">
            <label for="feedName">Your Name <span class="optional">(optional)</span></label>
            <input type="text" id="feedName" placeholder="e.g. Juan dela Cruz" />
          </div>

          <div class="form-group">
            <label for="feedPolitician">Politician Concerned <span class="required">*</span></label>
            <input type="text" id="feedPolitician" placeholder="e.g. Bongbong Marcos" />
          </div>

          <div class="form-group">
            <label for="feedType">Type of Submission <span class="required">*</span></label>
            <select id="feedType">
              <option value="" disabled selected>Select a type...</option>
              <option value="New Evidence">New Evidence</option>
              <option value="New Promise">New Promise</option>
              <option value="Correction">Correction</option>
              <option value="General Feedback">General Feedback</option>
            </select>
          </div>

          <div class="form-group">
            <label for="feedDescription">Description <span class="required">*</span></label>
            <textarea id="feedDescription" placeholder="Describe the evidence, promise, or correction in detail..."></textarea>
          </div>

          <div class="form-group">
            <label for="feedSource">Source URL <span class="required">*</span></label>
            <input type="text" id="feedSource" placeholder="https://rappler.com/..." />
          </div>

          <div class="form-error" id="formError"></div>

          <button class="submit-btn" onclick="submitFeedback()">Submit Report</button>

          </div><!-- end form-inner -->
        </div><!-- end form-card -->
      </div>

      <!-- SUBMISSIONS LIST -->
      <div class="submissions-wrap">
        <h2 class="submissions-title">Recent Submissions</h2>
        <div id="submissionsList"></div>
      </div>

    </div>

  </main>

  <script src="../js/feedback-data.js"></script>
  <script>
    function submitFeedback() {
      const politician = document.getElementById('feedPolitician').value.trim();
      const type = document.getElementById('feedType').value;
      const description = document.getElementById('feedDescription').value.trim();
      const source = document.getElementById('feedSource').value.trim();
      const errorEl = document.getElementById('formError');

      // Validation
      if (!politician || !type || !description || !source) {
        errorEl.textContent = 'Please fill in all required fields.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';

      const entry = {
        name: document.getElementById('feedName').value.trim() || 'Anonymous',
        politician,
        type,
        description,
        source: document.getElementById('feedSource').value.trim()
      };

      feedbackData.save(entry);

      // Reset form
      document.getElementById('feedName').value = '';
      document.getElementById('feedPolitician').value = '';
      document.getElementById('feedType').value = '';
      document.getElementById('feedDescription').value = '';
      document.getElementById('feedSource').value = '';

      renderSubmissions();
      showToast();
    }

    function renderSubmissions() {
      const list = document.getElementById('submissionsList');
      const all = feedbackData.getAll();

      if (all.length === 0) {
        list.innerHTML = '<p class="no-submissions">No submissions yet. Be the first to report!</p>';
        return;
      }

      list.innerHTML = all.map(entry => `
        <div class="submission-card">
          <div class="submission-top">
            <span class="submission-type ${entry.type.replace(' ', '-')}">${entry.type}</span>
            <span class="submission-date">${entry.date}</span>
          </div>
          <div class="submission-politician">${entry.politician}</div>
          <div class="submission-description">${entry.description}</div>
          ${entry.source ? `<a href="${entry.source}" class="submission-source" target="_blank">View Source →</a>` : ''}
          <div class="submission-author">— ${entry.name}</div>
        </div>
      `).join('');
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Load on page init
    renderSubmissions();
  </script>

  <div class="toast" id="toast">✓ Report submitted successfully!</div>

</body>
</html>
