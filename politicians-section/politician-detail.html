<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Politician — Pangako</title>
  <link rel="stylesheet" href="politician-detail.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">
      <img src="../images/main_logo.png" alt="Pangako" class="nav-logo-img" />
    </a>
    <div class="nav-links-wrapper">
      <ul class="nav-links">
        <li><a href="../index.html" class="nav-link">Home</a></li>
        <li><a href="politicians.html" class="nav-link active">Politicians</a></li>
        <li><a href="../news-section/news.html" class="nav-link">News</a></li>
        <li><a href="../feedback-section/feedback.html" class="nav-link">Feedback</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <!-- Back button -->
    <a href="politicians.html" class="back-btn">← Back to Politicians</a>
    <div class="hero-firstname" id="detailFirstname"></div>
    <img class="hero-photo" id="detailPhoto" src="" alt="" />
    <div class="hero-lastname" id="detailLastname"></div>
  </div>

  <div class="content">

    <!-- BASIC INFO -->
    <section class="section">
      <div class="section-body">
      <h2 class="section-title">Basic Info</h2>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Full Name</span>
          <span class="info-value" id="infoFullname"></span>
        </div>
        <div class="info-item">
          <span class="info-label">Position</span>
          <span class="info-value" id="infoPosition"></span>
        </div>
        <div class="info-item">
          <span class="info-label">Party</span>
          <span class="info-value" id="infoParty"></span>
        </div>
        <div class="info-item">
          <span class="info-label">Term</span>
          <span class="info-value" id="infoTerm"></span>
        </div>
      </div>
      <!-- Success Rate Bar -->
      <div class="rate-block">
        <div class="rate-header">
          <span class="rate-label">Success Rate</span>
          <span class="rate-value" id="infoRate"></span>
        </div>
        <div class="rate-bar-bg">
          <div class="rate-bar-fill" id="infoRateBar"></div>
        </div>
      </div>
      </div>
    </section>

    <!-- PROJECTS -->
    <section class="section">
      <div class="section-body">
      <h2 class="section-title">Projects</h2>
      <!-- Summary pills -->
      <div class="projects-summary" id="projectsSummary"></div>
      <!-- Project list -->
      <div class="projects-list" id="projectsList"></div>
      </div>
    </section>

    <!-- STANCES -->
    <section class="section">
      <div class="section-body">
      <h2 class="section-title">Stances</h2>
      <table class="stances-table">
        <thead>
          <tr>
            <th>Issue</th>
            <th>Stance</th>
            <th>Reference</th>
          </tr>
        </thead>
        <tbody id="stancesBody"></tbody>
      </table>
      </div>
    </section>

    <!-- SALN -->
    <section class="section">
      <div class="section-body">
      <h2 class="section-title">SALN <span class="section-subtitle">Statement of Assets, Liabilities & Net Worth</span></h2>
      <table class="saln-table">
        <thead>
          <tr>
            <th>Year</th>
            <th>Assets</th>
            <th>Liabilities</th>
            <th>Net Worth</th>
            <th>Reference</th>
          </tr>
        </thead>
        <tbody id="salnBody"></tbody>
      </table>
      </div>
    </section>

  </div>

  <script src="../js/politicians-data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const p = politiciansData.find(p => p.id === id);

    if (p) {
      document.title = p.firstname + ' ' + p.lastname + ' — Pangako';

      // Hero
      document.getElementById('detailFirstname').textContent = p.firstname;
      document.getElementById('detailLastname').textContent = p.lastname;
      document.getElementById('detailPhoto').src = p.photo;

      // Basic info
      document.getElementById('infoFullname').textContent = p.fullname;
      document.getElementById('infoPosition').textContent = p.position;
      document.getElementById('infoParty').textContent = p.party;
      document.getElementById('infoTerm').textContent = p.term;
      document.getElementById('infoRate').textContent = p.successRate;
      document.getElementById('infoRateBar').style.width = p.successRate;

      // Projects summary
      const fulfilled  = p.projects.filter(pr => pr.status === 'Fulfilled').length;
      const inProgress = p.projects.filter(pr => pr.status === 'In Progress').length;
      const discontinued = p.projects.filter(pr => pr.status === 'Discontinued').length;

      document.getElementById('projectsSummary').innerHTML = `
        <div class="pill pill--green">${fulfilled} Fulfilled</div>
        <div class="pill pill--blue">${inProgress} In Progress</div>
        <div class="pill pill--red">${discontinued} Discontinued</div>
      `;

      // Project list
      document.getElementById('projectsList').innerHTML = p.projects.map(pr => `
        <div class="project-card">
          <div class="project-top">
            <span class="project-name">${pr.name}</span>
            <div class="project-status">
              <span class="project-badge badge--${pr.status === 'Fulfilled' ? 'green' : pr.status === 'In Progress' ? 'blue' : 'red'}">
                ${pr.status}
              </span>
            </div>
          </div>
          <p class="project-desc">${pr.description}</p>
          ${pr.reference ? `
            <span class="reference-btn">View Reference
              <span class="tooltip">
                <ul>
                  <li><a href="${pr.reference}" target="_blank">${pr.reference}</a></li>
                </ul>
                <span class="arrow"></span>
              </span>
            </span>
          ` : '—'}
        </div>
      `).join('');

      // Stances
      document.getElementById('stancesBody').innerHTML = p.stances.map(s => `
        <tr>
          <td>${s.issue}</td>
          <td><span class="stance-badge stance--${s.stance === 'Agree' ? 'agree' : 'disagree'}">${s.stance}</span></td>
          <td>
              ${s.reference ? `
                <span class="reference-btn">View Reference
                  <span class="tooltip">
                    <ul>
                      <li><a href="${s.reference}" target="_blank">${s.reference}</a></li>
                    </ul>
                    <span class="arrow"></span>
                  </span>
                </span>
              ` : '—'}
            </td>
        </tr>
      `).join('');

      // SALN
      document.getElementById('salnBody').innerHTML = p.saln.map(s => {
        return `
          <tr>
            <td>${s.year}</td>
            <td>${s.assets}</td>
            <td>${s.liabilities}</td>
            <td class="saln-networth">${s.networth} </td>
            <td>
              ${s.reference ? `
                <span class="reference-btn">View Reference
                  <span class="tooltip">
                    <ul>
                      <li><a href="${s.reference}" target="_blank">${s.reference}</a></li>
                    </ul>
                    <span class="arrow"></span>
                  </span>
                </span>
              ` : '—'}
            </td>
          </tr>
        `;
      }).join('');
    }
  </script>

</body>
</html>
