<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Politicians — Pangako</title>
  <link rel="stylesheet" href="politicians.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">
      <img src="../images/main_logo.png" alt="Pangako" class="nav-logo-img" />
    </a>
    <div class="nav-links-wrapper">
      <ul class="nav-links">
        <li><a href="../index.html" class="nav-link">Home</a></li>
        <li><a href="politicians.html" class="nav-link active">Politicians</a></li>
        <li><a href="../news-section/news.html" class="nav-link">News</a></li>
        <li><a href="../feedback-section/feedback.html" class="nav-link">Feedback</a></li>
      </ul>
    </div>
  </nav>

  <main class="politicians">

    <!-- Search bar -->
    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Search politicians..."
        autocomplete="off"
      />
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>

    <!-- Grid rendered dynamically from API -->
    <div class="pol-grid" id="polGrid">
      <div class="pol-loading">Loading politicians...</div>
    </div>

    <div class="pol-expand">
      <button class="pol-expand-btn" id="expandBtn" onclick="togglePoliticians()" style="display:none;">Show More</button>
    </div>
  </main>

  <script>
    const API = 'http://localhost:3000/api';
    const VISIBLE_COUNT = 8;
    let allPoliticians = [];

    // Fetch all politicians from API
    async function loadPoliticians() {
      try {
        const res = await fetch(`${API}/politicians`);
        const data = await res.json();
        allPoliticians = data.data || [];
        renderGrid(allPoliticians);
        setupSearch();
      } catch (err) {
        document.getElementById('polGrid').innerHTML = '<div class="pol-loading">Failed to load politicians. Is the server running?</div>';
      }
    }

    // Render politician cards dynamically
    function renderGrid(politicians) {
      const grid = document.getElementById('polGrid');
      const btn = document.getElementById('expandBtn');

      if (politicians.length === 0) {
        grid.innerHTML = '<div class="pol-loading">No politicians found.</div>';
        btn.style.display = 'none';
        return;
      }

      grid.innerHTML = politicians.map(function(p, index) {
        const isHidden = index >= VISIBLE_COUNT;
        return `
          <div class="pol-card${isHidden ? ' pol-card--hidden' : ''}">
            <div class="pol-inner">
              <img class="pol-photo" src="${p.photo}" alt="${p.firstname} ${p.lastname}" />
              <h3 class="pol-name">${p.firstname} ${p.lastname}</h3>
              <p class="pol-detail">${p.position}</p>
              <p class="pol-detail">${p.party}</p>
              <p class="pol-detail">Success Rate: ${p.successRate}</p>
              <a href="politician-detail.html?id=${p._id}" class="pol-btn">View Politician</a>
            </div>
          </div>
        `;
      }).join('');

      btn.style.display = politicians.length > VISIBLE_COUNT ? 'inline-block' : 'none';
    }

    function togglePoliticians() {
      const hidden = document.querySelectorAll('.pol-card--hidden');
      const btn = document.getElementById('expandBtn');
      const isHidden = hidden[0].style.display === 'none' || hidden[0].style.display === '';
      hidden.forEach(card => card.style.display = isHidden ? 'flex' : 'none');
      btn.textContent = isHidden ? 'Show Less' : 'Show More';
    }

    // Search with suggestions
    function setupSearch() {
      const searchInput = document.getElementById('searchInput');
      const suggestions = document.getElementById('searchSuggestions');

      searchInput.addEventListener('input', function() {
        const query = this.value.trim().toLowerCase();

        if (query.length === 0) {
          suggestions.classList.remove('open');
          suggestions.innerHTML = '';
          renderGrid(allPoliticians);
          return;
        }

        const matches = allPoliticians.filter(function(p) {
          const fullname = (p.firstname + ' ' + p.lastname).toLowerCase();
          const fullnameDetailed = p.fullname.toLowerCase();
          return fullname.includes(query) || fullnameDetailed.includes(query);
        });

        if (matches.length === 0) {
          suggestions.innerHTML = '<div class="suggestion-empty">No politicians found</div>';
        } else {
          suggestions.innerHTML = matches.map(function(p) {
            return `
              <a href="politician-detail.html?id=${p._id}" class="suggestion-item">
                <img class="suggestion-photo" src="${p.photo}" alt="${p.firstname} ${p.lastname}" />
                <div class="suggestion-info">
                  <span class="suggestion-name">${p.firstname} ${p.lastname}</span>
                  <span class="suggestion-position">${p.position}</span>
                </div>
              </a>
            `;
          }).join('');
        }

        suggestions.classList.add('open');
      });

      // Close suggestions when clicking outside
      document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !suggestions.contains(e.target)) {
          suggestions.classList.remove('open');
        }
      });
    }

    // Init
    loadPoliticians();
  </script>

</body>
</html>
